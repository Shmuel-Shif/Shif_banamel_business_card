<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כרטיס ביקור דיגיטלי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --green: #22c55e;
      --green-dark: #16a34a;
      --fire: #f97316;
      --fire-red: #ef4444;
      --fire-dark: #dc2626;
      --accent: var(--green);
      --text: #f5f5f5;
      --text-muted: #9a9a9a;
      --radius: 20px;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: radial-gradient(circle at top, #020617 0, #020617 35%, #020617 60%, #000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 20%, rgba(34, 197, 94, 0.18), transparent 55%),
        radial-gradient(circle at 80% 0%, rgba(249, 115, 22, 0.18), transparent 55%),
        radial-gradient(circle at 0% 90%, rgba(239, 68, 68, 0.16), transparent 55%);
      filter: blur(40px);
      opacity: 0.9;
      z-index: -1;
      animation: bgMove 26s linear infinite alternate;
    }

    .card {
      position: relative;
      background:
        radial-gradient(circle at top, rgba(21, 128, 61, 0.45) 0, rgba(6, 78, 59, 0.25) 30%, rgba(3, 24, 19, 0.96) 70%, #020617 100%);
      border-radius: 28px;
      padding: 52px 32px 40px;
      max-width: 430px;
      width: 100%;
      box-shadow:
        0 40px 120px rgba(0, 0, 0, 0.85),
        0 0 0 1px rgba(22, 163, 74, 0.45);
      border: 1px solid rgba(6, 78, 59, 0.9);
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background:
        conic-gradient(
          from 180deg,
          rgba(34, 197, 94, 0.4),
          rgba(249, 115, 22, 0.5),
          rgba(239, 68, 68, 0.5),
          rgba(34, 197, 94, 0.4)
        );
      opacity: 0.16;
      z-index: -2;
      animation: borderSpin 18s linear infinite;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.98));
      z-index: -1;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-wrap {
      width: 190px;
      height: 220px;
      margin: 0 auto 10px;
      filter:
        drop-shadow(0 10px 25px rgba(0, 0, 0, 0.9))
        drop-shadow(0 0 32px rgba(34, 197, 94, 0.45));
      animation: floatLogo 6s ease-in-out infinite;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-svg {
      width: 100%;
      height: 100%;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(270deg, var(--green) 0%, var(--fire) 50%, var(--fire-red) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 10px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
      background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.94), rgba(15, 23, 42, 0.98));
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 1rem;
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, border-color 0.15s ease-out, background 0.15s ease-out;
      border: 1px solid rgba(15, 23, 42, 1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.75);
    }

    .link-item:hover {
      background: radial-gradient(circle at top left, rgba(15, 23, 42, 1), rgba(15, 23, 42, 0.98));
      border-color: rgba(34, 197, 94, 0.55);
      transform: translateY(-3px) scale(1.01);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.95),
        0 0 30px rgba(34, 197, 94, 0.32);
    }

    .link-item .icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .link-item.instagram .icon { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .link-item.whatsapp .icon { background: #25D366; }
    .link-item.tiktok .icon { background: #000; }
    .link-item.wolt .icon { background: #00c2ff; }
    .link-item.menu .icon { background: linear-gradient(135deg, var(--fire), var(--fire-red)); }

    .link-item .icon svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .menu-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }

    .menu-modal-backdrop.open {
      display: flex;
    }

    .menu-modal {
      position: relative;
      max-width: 480px;
      width: 100%;
      background: #050505;
      border-radius: 18px;
      padding: 16px 16px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--shadow);
    }

    .menu-modal img {
      width: 100%;
      height: auto;
      max-height: calc(100vh - 140px);
      object-fit: contain;
      border-radius: 12px;
      display: block;
    }

    .menu-modal-close {
      position: absolute;
      top: 10px;
      left: 10px;
      border: none;
      outline: none;
      border-radius: 999px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      color: #f5f5f5;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .menu-modal-close:hover {
      background: rgba(34, 197, 94, 0.85);
      transform: scale(1.03);
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 20px;
      }

      .logo-wrap {
        width: 120px;
        height: 120px;
      }

      .menu-modal {
        padding: 12px 12px 10px;
      }

      .menu-modal img {
        max-height: calc(100vh - 120px);
      }
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.8rem;
      color: rgba(148, 163, 184, 0.9);
      letter-spacing: 0.02em;
    }

    @keyframes bgMove {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(4%, -3%, 0) scale(1.05); }
      100% { transform: translate3d(-4%, 3%, 0) scale(1.02); }
    }

    @keyframes borderSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>

  <div class="menu-modal-backdrop" id="menuModal">
    <div class="menu-modal">
      <button class="menu-modal-close" id="menuModalClose" aria-label="סגירת תפריט">✕</button>
      <img src="2.PNG" alt="תפריט">
    </div>

  <script>
    (function () {
      var menuLink = document.querySelector('.link-item.menu');
      var menuModal = document.getElementById('menuModal');
      var menuModalClose = document.getElementById('menuModalClose');

      if (!menuLink || !menuModal) return;

      menuLink.addEventListener('click', function (e) {
        e.preventDefault();
        menuModal.classList.add('open');
      });

      if (menuModalClose) {
        menuModalClose.addEventListener('click', function () {
          menuModal.classList.remove('open');
        });
      }

      menuModal.addEventListener('click', function (e) {
        if (e.target === menuModal) {
          menuModal.classList.remove('open');
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && menuModal.classList.contains('open')) {
          menuModal.classList.remove('open');
        }
      });
    })();
  </script>
